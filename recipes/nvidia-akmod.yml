modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion

    install:
      allow-erasing: true
      install-weak-deps: false
      skip-unavailable: true
      packages:
        - rpmfusion-free-release-tainted
        - rpmfusion-nonfree-release-tainted
        
        - akmod-nvidia-open 
        - xorg-x11-drv-nvidia-open
