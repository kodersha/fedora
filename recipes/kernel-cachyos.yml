modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
        - bieszczaders/kernel-cachyos
    install:
      allow-erasing: true
      install-weak-deps: false
      skip-unavailable: true      
      packages:
        - cachyos-ksm-settings
        - cachyos-settings
        - kernel-cachyos
        - kernel-cachyos-nvidia-open
        - scx-scheds

  - type: systemd
    system:
      enabled:
      - scx_loader.service
