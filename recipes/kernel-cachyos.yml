modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
        - bieszczaders/kernel-cachyos
      nonfree: rpmfusion
    install:
      allow-erasing: true
      install-weak-deps: false
      skip-unavailable: true      
      packages:
        - akmod-nvidia
        - xorg-x11-drv-nvidia
        - xorg-x11-drv-nvidia-cuda
        - cachyos-ksm-settings
        - cachyos-settings
        - kernel-cachyos
        - scx-scheds

  - type: initramfs

  - type: systemd
    system:
      enabled:
      - scx_loader.service