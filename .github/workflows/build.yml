name: build
on:
  schedule:
    - cron: "00 22 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Cleanup Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0

  build:
    name: Build Custom Image
    runs-on: ubuntu-latest
    needs: cleanup
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build
        uses: blue-build/github-action@v1.7
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true

  cleanup-packages:
    name: Cleanup Packages
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Cleanup Packages
      uses: actions/delete-package-versions@v5
      with: 
        package-name: 'fedora'
        package-type: 'container'
        min-versions-to-keep: 6
